version: 2
updates:
  # GitHub Actions — keep action versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  # npm — keep runtime and dev dependencies updated
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-production:
        dependency-type: "production"
        patterns:
          - "*"
      npm-development:
        dependency-type: "development"
        patterns:
          - "*"
    ignore:
      - dependency-name: "semantic-release"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@semantic-release/*"
        update-types: ["version-update:semver-major"]
      # Major bumps below require individual migration PRs — ignore until tackled deliberately
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zustand"
        update-types: ["version-update:semver-major"]
      - dependency-name: "date-fns"
        update-types: ["version-update:semver-major"]
      - dependency-name: "concurrently"
        update-types: ["version-update:semver-major"]

  # Docker — keep base image updated (Node.js minor/patch, Alpine security patches)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Stay on Node 22 LTS (supported until April 2027) — ignore major version bumps
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
