services:
  firecrawl-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: firecrawl-dashboard:local
    container_name: firecrawl-dashboard
    ports:
      - "3003:3000"
    environment:
      - FIRECRAWL_URL=http://10.0.20.66:3002
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
