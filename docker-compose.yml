version: '3.8'

services:
  firecrawl-dashboard:
    image: firecrawl-dashboard:local
    container_name: firecrawl-dashboard
    ports:
      - "3003:3001"
    environment:
      - FIRECRAWL_URL=http://10.0.20.66:3002
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
