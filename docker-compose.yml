services:
  firecrawl-dashboard:
    image: ghcr.io/tekgnosis-net/firecrawl-dashboard:latest
    pull_policy: always
    container_name: firecrawl-dashboard
    user: "1000:1000"
    ports:
      - "3003:3000"
    environment:
      - FIRECRAWL_URL=http://10.0.20.66:3002
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
